name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-and-upload:
    name: Build & Upload Release Asset
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify dist file exists
        run: |
          if [ ! -f "dist/universal-remote-card.min.js" ]; then
            echo "Build failed: dist/universal-remote-card.min.js not found"
            exit 1
          fi
          echo "Build succeeded. File size: $(du -sh dist/universal-remote-card.min.js | cut -f1)"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/universal-remote-card.min.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
